<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Awesome Russia Forum</title>
<link rel="stylesheet" href="css/style.css">
<script src="js/main.js" defer></script>
</head>
<body>
<h1>Awesome Russia Forum</h1>

<!-- Регистрация -->
<h2>Регистрация</h2>
<input id="usernameReg" placeholder="Логин">
<input id="passwordReg" type="password" placeholder="Пароль">
<button onclick="register()">Регистрация</button>

<!-- Логин -->
<h2>Вход</h2>
<input id="usernameLogin" placeholder="Логин">
<input id="passwordLogin" type="password" placeholder="Пароль">
<button onclick="login()">Войти</button>
<button onclick="logout()">Выйти</button>

<!-- Профиль -->
<div id="profile">
  <h2>Профиль</h2>
  <p id="profileName"></p>
</div>

<!-- Темы -->
<h2>Темы</h2>
<input id="topicTitle" placeholder="Заголовок">
<textarea id="topicContent" placeholder="Содержание"></textarea>
<button onclick="createTopic()">Создать тему</button>
<div id="topicsList"></div>

<!-- Админка -->
<div id="adminPanel"></div>

<!-- Бан -->
<div id="banWindow" style="display:none;position:fixed;top:20%;left:20%;width:60%;padding:20px;background:#222;color:#00eaff;border-radius:8px;z-index:999;"></div>
</body>
</html>
